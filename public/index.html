<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lehrerplaner">
<meta name="theme-color" content="#1a5276">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>Lehrerplaner</title>
<link rel="stylesheet" href="vendor/tabler/tabler-icons.min.css">
<style>
:root{--bg:#f5f4f0;--sur:#fff;--sur2:#f0efe9;--bor:rgba(0,0,0,.1);--borm:rgba(0,0,0,.18);--tx:#1a1a18;--tx2:#5a5a52;--tx3:#9a9a8e;--ac:#1a5276;--acbg:#e8f0f7;--acbor:#378add;--actx:#0c447c;--gr:#0f6e56;--grbg:#e1f5ee;--am:#854f0b;--ambg:#faeeda;--re:#993c1d;--rebg:#faece7;--rad:10px;--rads:6px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--sur:#242420;--sur2:#2e2e2a;--bor:rgba(255,255,255,.1);--borm:rgba(255,255,255,.18);--tx:#f0efe9;--tx2:#a0a095;--tx3:#606058;--ac:#378add;--acbg:#0c1f35;--acbor:#185fa5;--actx:#85b7eb;--gr:#5dcaa5;--grbg:#04342c;--am:#ef9f27;--ambg:#412402;--re:#f0997b;--rebg:#4a1b0c}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overscroll-behavior:none}
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--sur);border-right:.5px solid var(--bor);display:flex;flex-direction:column;overflow-y:auto}
.shead{padding:16px;border-bottom:.5px solid var(--bor)}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.logo-tx{font-size:14px;font-weight:600;color:var(--tx)}
.logo-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.nsec{padding:12px 16px 3px;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:var(--tx2);font-size:13px;border-left:2px solid transparent;transition:background .12s;user-select:none}
.ni:hover{background:var(--sur2);color:var(--tx)}
.ni.active{background:var(--acbg);color:var(--actx);border-left-color:var(--ac);font-weight:500}
.ni i{font-size:17px;width:20px;text-align:center}
.nsp{flex:1}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--sur);border-bottom:.5px solid var(--bor);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.tbtit{font-size:15px;font-weight:600}
.tbact{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{background:transparent;border:.5px solid var(--borm);border-radius:var(--rads);padding:6px 12px;cursor:pointer;font-size:13px;color:var(--tx);display:inline-flex;align-items:center;gap:6px;transition:background .12s,transform .08s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--sur2)}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--acbg);border-color:var(--acbor);color:var(--actx);font-weight:500}
.btn.pri:hover{filter:brightness(.96)}
.btn.ico{padding:6px 8px}
.btn.dan{color:var(--re);border-color:var(--rebg)}
.btn.sml{padding:4px 9px;font-size:12px}
.card{background:var(--sur);border:.5px solid var(--bor);border-radius:var(--rad);padding:16px 18px;margin-bottom:14px}
.ctit{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.ctit i{font-size:15px}
/* WEEK GRID */
.wkwrap{background:var(--sur);border:.5px solid var(--bor);border-radius:var(--rad);overflow:hidden;margin-bottom:14px}
.wkgrid{display:grid;grid-template-columns:52px repeat(5,1fr)}
.wg-cor{background:var(--sur2);border-bottom:.5px solid var(--bor);border-right:.5px solid var(--bor);padding:6px;display:flex;align-items:flex-end;justify-content:flex-end}
.wg-day{background:var(--sur2);border-bottom:.5px solid var(--bor);border-right:.5px solid var(--bor);padding:5px 5px;text-align:center;min-height:52px;display:flex;flex-direction:column;justify-content:center}
.wg-day:last-child{border-right:none}
.wg-day.tod{background:var(--acbg)}
.wg-dn{font-size:12px;font-weight:600;color:var(--tx2)}
.wg-day.tod .wg-dn{color:var(--actx)}
.wg-dd{font-size:10px;color:var(--tx3);margin-top:1px}
.wg-time{border-right:.5px solid var(--bor);border-bottom:.5px solid var(--bor);padding:4px 5px 0 2px;font-size:10px;color:var(--tx3);text-align:right;min-height:70px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:5px}
.wg-cell{border-right:.5px solid var(--bor);border-bottom:.5px solid var(--bor);min-height:70px;padding:3px;position:relative;transition:background .1s}
.wg-cell:last-child{border-right:none}
.wg-row:last-child .wg-time,.wg-row:last-child .wg-cell{border-bottom:none}
.wg-cell:hover{background:var(--sur2)}
.wg-cell.wk-fer{background:#EAF3DE!important}
.wg-cell.wk-fer:hover{background:#d8eccc!important}
.wg-cell.wk-fei{background:#FCEAEA!important}
.wg-cell.wk-fei:hover{background:#f5d5d5!important}
.sp-bg{position:absolute;inset:0;padding:3px 5px;pointer-events:none;z-index:0}
.sp-kl{font-size:10px;font-weight:600;color:var(--tx3);opacity:.7}
.sp-fa{font-size:9px;color:var(--tx3);opacity:.5}
.sp-link{position:absolute;bottom:2px;right:3px;font-size:9px;color:var(--acbor);opacity:.7;cursor:pointer;pointer-events:all;z-index:2;text-decoration:none}
.sp-link:hover{opacity:1}
.lb-nclink{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--acbor);text-decoration:none;margin-top:2px;opacity:.75}
.lb-nclink:hover{opacity:1;text-decoration:underline}
.cell-click{position:absolute;inset:0;z-index:1;cursor:pointer}
.lb{border-radius:5px;padding:4px 6px;font-size:11px;position:relative;z-index:2;cursor:pointer;display:block}
.lb.unterricht{background:var(--grbg);border-left:3px solid var(--gr);color:var(--gr)}
.lb.meeting{background:var(--acbg);border-left:3px solid var(--acbor);color:var(--actx)}
.lb.frei{background:var(--sur2);border-left:3px solid var(--borm);color:var(--tx3)}
.lb.notiz{background:var(--ambg);border-left:3px solid var(--am);color:var(--am)}
.lb-kl{font-weight:600;font-size:11px}
.lb-no{font-size:10px;margin-top:1px;opacity:.75;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lb-pr{font-size:10px;margin-top:1px;opacity:.6}
/* HALBJAHR */
.hjleg{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.ll{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.hjtbl{border-collapse:collapse;width:100%;table-layout:fixed}
.hjtbl th{font-size:11px;font-weight:500;color:var(--tx2);text-align:center;padding:5px 2px;border-bottom:.5px solid var(--bor);background:var(--sur2)}
.hjtbl th.dc{width:30px}
.hjtbl th.mc{font-size:12px;font-weight:500;color:var(--tx)}
.hjtbl td{border:.5px solid var(--bor);padding:0;height:22px;vertical-align:top}
td.dnum{text-align:right;padding:3px 4px 0 0;font-size:10px;color:var(--tx3);background:var(--sur2);width:30px;white-space:nowrap}
td.dnum.we{opacity:.4}
td.dnum.tdn{color:var(--actx);font-weight:600;background:var(--acbg)}
td.ec{cursor:pointer;position:relative;padding:1px 3px}
td.ec:hover{background:var(--sur2)}
td.ec.we{background:var(--bg);opacity:.6}
td.ec.fer{background:#EAF3DE}
td.ec.fer:hover{background:#d8eccc}
td.ec.fei{background:#FCEAEA}
td.ec.fei:hover{background:#f5d5d5}
td.ec.emp{background:var(--sur2);opacity:.2;cursor:default}
td.ec.tdc{outline:1.5px solid var(--acbor);outline-offset:-1px}
.epill{display:inline-block;border-radius:2px;padding:1px 4px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4;cursor:pointer}
.pk{background:#E6F1FB;color:#0C447C}
.pd{background:#FCEBEB;color:#791F1F}
.pt{background:#FAEEDA;color:#633806}
.pf{background:#EAF3DE;color:#085041}
.ps{background:#F1EFE8;color:#444441}
/* STUNDENPLAN */
.sp-table{border-collapse:collapse;width:100%;min-width:600px}
.sp-table th{background:var(--sur2);border:.5px solid var(--bor);padding:7px 10px;font-size:12px;font-weight:500;color:var(--tx2);text-align:center}
.sp-table td{border:.5px solid var(--bor);padding:3px}
.sp-table td:first-child{background:var(--sur2);font-size:11px;color:var(--tx3);text-align:right;padding:4px 8px;white-space:nowrap}
.sp-cell-btn{width:100%;background:transparent;border:none;font-size:11px;color:var(--tx);font-family:inherit;padding:4px 5px;cursor:pointer;text-align:left;border-radius:4px;min-height:40px;display:flex;flex-direction:column;gap:2px}
.sp-cell-btn:hover{background:var(--sur2)}
.sp-kl-tag{font-weight:600;font-size:11px;color:var(--actx)}
.sp-fa-tag{font-size:10px;color:var(--tx3)}
.sp-empty-tag{font-size:10px;color:var(--tx3);opacity:.4}
.plan-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ptab{padding:5px 12px;border-radius:20px;border:.5px solid var(--borm);background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:inherit;transition:all .12s}
.ptab.active{background:var(--acbg);border-color:var(--acbor);color:var(--actx);font-weight:500}
.ab-row{display:flex;gap:5px}
.abtab{padding:4px 10px;border-radius:20px;border:.5px solid var(--borm);background:transparent;cursor:pointer;font-size:11px;color:var(--tx2);font-family:inherit;transition:all .12s}
.abtab.active{background:var(--ambg);border-color:var(--am);color:var(--am);font-weight:500}
/* KLASSENBUCH */
.kb-wrap{overflow-x:auto}
.kb-tbl{border-collapse:collapse;min-width:100%}
.kb-tbl th{background:var(--sur2);border:.5px solid var(--bor);padding:6px 8px;font-size:11px;font-weight:500;color:var(--tx2);white-space:nowrap;text-align:center}
.kb-tbl th.namecol{text-align:left;min-width:150px;position:sticky;left:0;z-index:3;background:var(--sur2)}
.kb-tbl th.datecol{min-width:52px;cursor:pointer}
.kb-tbl th.datecol:hover{background:var(--acbg);color:var(--actx)}
.kb-tbl td{border:.5px solid var(--bor);padding:0;vertical-align:middle}
.kb-tbl td.namecell{padding:6px 10px;font-size:12px;font-weight:500;background:var(--sur);position:sticky;left:0;z-index:2;min-width:150px;white-space:nowrap}
.kb-tbl td.datacell{width:52px;min-width:52px;text-align:center;cursor:pointer;position:relative;transition:background .1s}
.kb-tbl td.datacell:hover{filter:brightness(.93)}
.kb-tbl td.trendcell{padding:4px 6px;text-align:center;min-width:70px}
.kbdot{width:28px;height:28px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;user-select:none;transition:transform .1s}
.kbdot:hover{transform:scale(1.12)}
.kbdot.leer{background:var(--sur2);color:var(--tx3);border:.5px solid var(--borm)}
.kbdot.gruen{background:#EAF3DE;color:#27500A}
.kbdot.gelb{background:#FAEEDA;color:#633806}
.kbdot.orange{background:#FAECE7;color:#712B13}
.kbdot.rot{background:#FCEBEB;color:#791F1F}
.note-ind{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--acbor)}
.trend-bar{display:flex;gap:2px;justify-content:center}
.tb{width:8px;height:8px;border-radius:2px}
.tb.gruen{background:#639922}.tb.gelb{background:#EF9F27}.tb.orange{background:#D85A30}.tb.rot{background:#E24B4A}.tb.leer{background:var(--bor)}
.kl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.kltab{padding:6px 14px;border-radius:20px;border:.5px solid var(--borm);background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:inherit;transition:all .12s}
.kltab.active{background:var(--acbg);border-color:var(--acbor);color:var(--actx);font-weight:500}
.kb-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.kll{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--sur);border-radius:var(--rad);padding:20px;width:390px;max-width:100%;max-height:88dvh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mtit{font-size:15px;font-weight:600}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--sur2);border:.5px solid var(--borm);border-radius:var(--rads);padding:8px 10px;font-size:13px;color:var(--tx);font-family:inherit}
.field textarea{resize:vertical;min-height:90px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--acbor)}
.tchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tchip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--borm);color:var(--tx2);background:transparent;font-family:inherit;transition:all .12s}
.tchip:hover{background:var(--sur2)}
.tchip.active{border-color:var(--acbor);background:var(--acbg);color:var(--actx);font-weight:500}
.colrow{display:flex;gap:7px;margin-bottom:14px}
.colbtn{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;font-size:11px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;font-family:inherit;transition:border-color .12s}
.colbtn .cb-dot{width:20px;height:20px;border-radius:50%}
.colbtn.active{border-color:var(--borm)}
.colbtn.c-leer .cb-dot{background:var(--sur2);border:.5px solid var(--borm)}.colbtn.c-leer{color:var(--tx3)}
.colbtn.c-gruen .cb-dot{background:#639922}.colbtn.c-gruen{color:#27500A}
.colbtn.c-gelb .cb-dot{background:#EF9F27}.colbtn.c-gelb{color:#633806}
.colbtn.c-orange .cb-dot{background:#D85A30}.colbtn.c-orange{color:#712B13}
.colbtn.c-rot .cb-dot{background:#E24B4A}.colbtn.c-rot{color:#791F1F}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
/* MISC */
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--bor);font-size:13px}
.srow:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bg-gr{background:var(--grbg);color:var(--gr)}
.bg-am{background:var(--ambg);color:var(--am)}
.dz{border:1.5px dashed var(--borm);border-radius:var(--rad);padding:24px 20px;text-align:center;cursor:pointer;color:var(--tx3);transition:all .12s}
.dz:hover{border-color:var(--acbor);background:var(--acbg);color:var(--actx)}
.dz i{font-size:26px;display:block;margin-bottom:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--borm);border-radius:10px}
@media print{.sidebar,.topbar,.tbact,.kl-tabs .btn,.kb-legend .btn{display:none!important}.app{display:block}.main{overflow:visible}.content{padding:8px}.kb-wrap{overflow:visible}}
@media(max-width:700px){.sidebar{width:52px;min-width:52px}.logo-tx,.logo-sub,.ni span,.nsec{display:none}.ni{padding:10px;justify-content:center}.content{padding:12px}}
</style>
</head>

<script>
/* ===== Lehrerkalender: Serveranbindung =====
   localStorage dient nur noch als synchroner Offline-Cache. Quelle der Wahrheit
   ist die verschlüsselte Pro-Nutzer-DB auf dem Server (/api/state). */
var __lkSync={pending:{},timer:null,online:false};
function __lkAppKey(k){return /^(lp_|pref_|ms_)/.test(k);}
// Schreibt einen (bereits als String serialisierten) Wert debounced an den Server.
function lkPush(k,v){__lkSync.pending[k]=v;if(!__lkSync.timer)__lkSync.timer=setTimeout(lkFlush,600);}
function lkFlush(){
  __lkSync.timer=null;
  var payload=__lkSync.pending;__lkSync.pending={};
  if(!Object.keys(payload).length)return;
  fetch('/api/state',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(payload)})
    .then(function(r){if(!r.ok)throw new Error('save');})
    .catch(function(){ // fehlgeschlagen -> zurück in die Queue (best effort)
      Object.keys(payload).forEach(function(k){if(!(k in __lkSync.pending))__lkSync.pending[k]=payload[k];});
      if(!__lkSync.timer)__lkSync.timer=setTimeout(lkFlush,3000);
    });
}
// S aus dem (frisch vom Server befüllten) Cache neu laden.
function lkReloadState(){
  S.schuljahr=ld('lp_sj','2025/26');
  S.lessons=ld('lp_lessons',{});
  S.klassen=ld('lp_klassen',S.klassen);
  S.hjEntries=ld('lp_hj',{});
  S.stundenplaene=ld('lp_sp',buildDefaultPlans(4));
  S.weekConfig=ld('lp_wkcfg',{});
  S.kbData=ld('lp_kb',{});
  S.lessonLinks=ld('lp_links',{});
}
(function lkBootstrap(){
  fetch('/api/me',{credentials:'same-origin'})
    .then(function(r){
      if(r.status===401){window.location.replace('login.html');return null;}
      if(!r.ok)throw new Error('me');
      return r.json();
    })
    .then(function(me){
      if(!me)return null;
      // Nutzerwechsel im selben Browser -> lokalen Cache leeren (kein Fremd-Datenblick)
      var prev=localStorage.getItem('lk_user');
      if(prev&&prev!==me.username){Object.keys(localStorage).filter(__lkAppKey).forEach(function(k){localStorage.removeItem(k);});}
      localStorage.setItem('lk_user',me.username);
      return fetch('/api/state',{credentials:'same-origin'});
    })
    .then(function(r){return (r&&r.ok)?r.json():null;})
    .then(function(data){
      if(!data)return;
      // Server = Quelle der Wahrheit: alte App-Keys entfernen, Serverstand einspielen.

function ostern(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,dy);}
function addD(dt,n){var r=new Date(dt);r.setDate(r.getDate()+n);return r;}

function getSHFeiertage(y){var o=ostern(y);var r={};r[fmtD(new Date(y,0,1))]='Neujahr';r[fmtD(addD(o,-2))]='Karfreitag';r[fmtD(o)]='Ostersonntag';r[fmtD(addD(o,1))]='Ostermontag';r[fmtD(new Date(y,4,1))]='Tag der Arbeit';r[fmtD(addD(o,39))]='Christi Himmelfahrt';r[fmtD(addD(o,49))]='Pfingstsonntag';r[fmtD(addD(o,50))]='Pfingstmontag';r[fmtD(new Date(y,9,3))]='Tag d. Dt. Einheit';r[fmtD(new Date(y,9,31))]='Reformationstag';r[fmtD(new Date(y,11,25))]='1. Weihnachtstag';r[fmtD(new Date(y,11,26))]='2. Weihnachtstag';return r;}

// Find the active plan for a given date
function getActivePlan(dateStr){
  // Filter plans that have a validFrom date and it's <= dateStr
  const dated=S.stundenplaene.filter(p=>p.validFrom&&p.validFrom<=dateStr);
  if(dated.length===0){
    // No dated plans: use weekConfig or first plan
    return null;
  }
  // Return the one with the latest validFrom (most recent)
  dated.sort((a,b)=>b.validFrom.localeCompare(a.validFrom));
  return S.stundenplaene.indexOf(dated[0]);
}

function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7)}
function getMonday(w,y){const j=new Date(y,0,1);const dw=j.getDay()||7;const m1=new Date(j);m1.setDate(j.getDate()+(1-dw));const r=new Date(m1);r.setDate(m1.getDate()+(w-1)*7);return r}
function fmtDate(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'}
function dStr(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function curSJ(){return S.schuljahr||'2025/26';}
function isFerie(ds){return getFerien(curSJ()).some(f=>ds>=f.s&&ds<=f.e);}
function isFeiertag(ds){
  // Check imported Feiertage first (stored as single-day Ferien-blocks with isFeiertag flag)
  var imported=getFerien(curSJ()).find(function(f){return f.isFeiertag&&ds>=f.s&&ds<=f.e;});
  if(imported)return true;
  return false;
}
function importFeiertageSH(){
  var sj=curSJ();
  var y1=parseInt(sj.split('/')[0]);
  var y2=2000+parseInt(sj.split('/')[1]);
  var blocks=[];
  [y1,y2].forEach(function(y){
    var fe=getSHFeiertage(y);
    Object.keys(fe).forEach(function(ds){blocks.push({s:ds,e:ds,l:fe[ds],isFeiertag:true});});
  });
  var current=getFerien(sj);
  // Remove old imported feiertage first (avoid duplicates), keep manual ferien
  var kept=current.filter(function(f){return !f.isFeiertag;});
  var merged=kept.concat(blocks).sort(function(a,b){return a.s.localeCompare(b.s);});
  saveFerien(sj,merged);
  toast(blocks.length+' Feiertage (SH) importiert');
  render();
}
function feiertagLabel(ds){var y=parseInt(ds.slice(0,4));return getSHFeiertage(y)[ds]||'';}
function ferieLabel(ds){var f=getFerien(curSJ()).find(f=>ds>=f.s&&ds<=f.e);return f?f.l:'';}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function dow(y,m,d){const w=new Date(y,m,d).getDay();return w===0?6:w-1}

/* KB helpers */
function kbKey(klId,sId,date,fach){return klId+'||'+sId+'||'+date+(fach?'||'+fach:'')}
function kbKeyMatch(key,klId,fach){
  const p=key.split('||');
  if(p[0]!==klId)return false;
  if(!fach)return true; // no fach filter
  return p[3]===fach||(!p[3]&&!fach);
}
function kbGet(klId,sId,date,fach){return S.kbData[kbKey(klId,sId,date,fach||S.selFach)]||{color:'leer',note:''}}
function kbSet(klId,sId,date,val,fach){S.kbData[kbKey(klId,sId,date,fach||S.selFach)]=val;saveAll()}
function kbDates(klId,fach){
  const ds=new Set();
  Object.keys(S.kbData).forEach(k=>{
    const p=k.split('||');
    if(p[0]!==klId||!p[2])return;
    if(fach&&(p[3]||'')!==fach)return; // filter by fach
    ds.add(p[2]);
  });
  return[...ds].sort();
}

/* Add a date column to KB for a class (called from Wochenplan) */
function kbAddDate(klId,dateStr,fach){

function getWeekSP(w,y){
  const cfg=S.weekConfig[`${y}-${w}`]||{};
  // If week has manual override, use it
  if(cfg.plan!==undefined){
    return{plan:S.stundenplaene[cfg.plan]||S.stundenplaene[0],ab:cfg.ab||'A',planIdx:cfg.plan};
  }
  // Auto-detect: find plan with latest validFrom <= Monday of this week
  const monday=getMonday(w,y);
  const mondayStr=monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
  const autoIdx=getActivePlan(mondayStr);
  if(autoIdx!==null&&autoIdx!==undefined){
    return{plan:S.stundenplaene[autoIdx],ab:cfg.ab||'A',planIdx:autoIdx,auto:true};
  }
  return{plan:S.stundenplaene[0],ab:cfg.ab||'A',planIdx:0};
}

    [{y:y1,m:7},{y:y1,m:8},{y:y1,m:9},{y:y1,m:10},{y:y1,m:11},{y:y2,m:0}]:
    [{y:y2,m:1},{y:y2,m:2},{y:y2,m:3},{y:y2,m:4},{y:y2,m:5},{y:y2,m:6}];
  const maxD=Math.max(...months.map(({y,m})=>daysInMonth(y,m)));
  const today=todayStr();
  const sjList=['2025/26','2026/27','2027/28'];
  const sjBtns=sjList.map((s,si)=>'<button class="btn sml '+(s===sj?'pri':'')+'" onclick="setSJ([\'2025/26\',\'2026/27\',\'2027/28\']['+si+'])">'+ s +'</button>').join('');
  ta.innerHTML='<span style="font-size:12px;color:var(--tx2);flex-shrink:0">Schuljahr:</span>'+sjBtns
    +'<button class="btn sml" onclick="showView(&quot;ferien&quot;)" style="margin-left:4px"><i class="ti ti-sun" aria-hidden="true"></i> Ferien</button>'
    +'<button class="btn sml" onclick="archiveSJ()" style="margin-left:auto"><i class="ti ti-download" aria-hidden="true"></i> Archivieren</button>';
  let h='<div style="display:flex;gap:6px;margin-bottom:10px">'
    +'<button class="btn '+(S.hjNum===1?'pri':'')+'" onclick="setHJ(1)">Aug – Jan</button>'
    +'<button class="btn '+(S.hjNum===2?'pri':'')+'" onclick="setHJ(2)">Feb – Jul</button></div>'
    +'<div class="hjleg">'
    +'<span class="ll"><span class="ld" style="background:#E6F1FB;border:.5px solid #85B7EB"></span>Konferenz</span>'
    +'<span class="ll"><span class="ld" style="background:#FCEBEB;border:.5px solid #F09595"></span>Deadline</span>'
    +'<span class="ll"><span class="ld" style="background:#FAEEDA;border:.5px solid #EF9F27"></span>Termin</span>'
    +'<span class="ll"><span class="ld" style="background:#EAF3DE;border:.5px solid #97C459"></span>Ferien</span>'
    +'<span class="ll"><span class="ld" style="background:#F1EFE8;border:.5px solid #B4B2A9"></span>Sonstiges</span>'
    +(getFerien(sj).some(function(f){return f.isFeiertag;})?'':'<span class="ll" style="color:var(--am)"><i class="ti ti-alert-triangle" style="font-size:12px"></i> Keine Feiertage importiert – <a href="#" onclick="importFeiertageSH();return false;" style="color:var(--actx);text-decoration:underline">jetzt importieren</a></span>')
    +'</div><div style="overflow-x:auto"><table class="hjtbl"><thead><tr><th class="dc"></th>';
  months.forEach(({y,m})=>{h+='<th class="mc">'+MONTHS[m]+'<br><span style="font-size:10px;font-weight:400;color:var(--tx3)">'+y+'</span></th>';});
  h+='</tr></thead><tbody>';
  for(let d=1;d<=maxD;d++){
    const valid=months.filter(({y,m})=>d<=daysInMonth(y,m));
    if(!valid.length)continue;
    const {y:fy,m:fm}=valid[0];
    const dw0=dow(fy,fm,d);
    const isWE=dw0>=5;
    const dayL=['Mo','Di','Mi','Do','Fr','Sa','So'];
    const isTodayRow=months.some(({y,m})=>dStr(y,m,d)===today);
    h+='<tr><td class="dnum'+(isWE?' we':'')+(isTodayRow?' tdn':'')+'">'+d+'<br><span style="font-size:9px">'+dayL[dw0]+'</span></td>';
    months.forEach(({y,m})=>{
      if(d>daysInMonth(y,m)){h+='<td class="ec emp"></td>';return;}
      const ds=dStr(y,m,d);
      const fer=isFerie(ds);
            const entry=S.hjEntries[ds];
      let cls='ec';
      if(isWE)cls+=' we';if(fer)cls+=' fer';if(ds===today)cls+=' tdc';
      const pc={konferenz:'pk',deadline:'pd',termin:'pt',frei:'pf',sonstiges:'ps'};
      let inner='';
      if(entry){inner='<span class="epill '+(pc[entry.type]||'ps')+'" onclick="openHJEdit(event,&quot;'+ds+'&quot;)">'+esc(entry.text)+'</span>';}
      else if(fer&&!isWE){inner='<span style="font-size:9px;color:#3B6D11;opacity:.6">'+ferieLabel(ds)+'</span>';}
      h+='<td class="'+cls+'" onclick="openHJAdd(&quot;'+ds+'&quot;)">'+inner+'</td>';
    });
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  c.innerHTML=h;
}
function setHJ(n){S.hjNum=n;render();}
function setSJ(sj){S.schuljahr=sj;sv('lp_sj',sj);const y1=parseInt(sj.split('/')[0]);S.week=getWeekNum(new Date(y1,7,1));S.year=y1;render();toast('Schuljahr '+sj);}
function archiveSJ(){
  const sj=curSJ();
  const data={schuljahr:sj,lessons:S.lessons,klassen:S.klassen,hjEntries:S.hjEntries,kbData:S.kbData,stundenplaene:S.stundenplaene,weekConfig:S.weekConfig,ferien:getFerien(sj),archived:new Date().toISOString()};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='lehrerplaner-archiv-'+sj.replace('/','_')+'.json';a.click();
  toast('Archiv wird heruntergeladen...');
  setTimeout(()=>{
    if(confirm('Archiv gespeichert!\nEinträge dieses Schuljahres löschen und neu starten?\n(Klassen + Stundenpläne bleiben erhalten)')){
      const y1=parseInt(sj.split('/')[0]);const y2=2000+parseInt(sj.split('/')[1]);
      Object.keys(S.lessons).forEach(k=>{const y=parseInt(k);if(y===y1||y===y2)delete S.lessons[k];});
      Object.keys(S.hjEntries).forEach(k=>{const y=parseInt(k);if(y===y1||y===y2)delete S.hjEntries[k];});
      Object.keys(S.kbData).forEach(k=>{const dt=(k.split('||')[2]||'');const y=parseInt(dt);if(y===y1||y===y2)delete S.kbData[k];});
      saveAll();toast('Daten von '+sj+' geleert');render();
    }
  },1200);
}

function renderKlassen(c,ta){
  if(!S.selKlasse&&S.klassen.length)S.selKlasse=S.klassen[0].id;

    const isActive=k.id===S.selKlasse;

    tabs+='</span>';
  });
  tabs+='<button class="btn sml" onclick="addKbDateManual()" style="margin-left:4px"><i class="ti ti-calendar-plus" aria-hidden="true"></i>Datum</button></div>';

  if(!kl){c.innerHTML=tabs+'<div style="text-align:center;padding:40px;color:var(--tx3)">Keine Klasse ausgewählt</div>';return}

  // Collect all fächer for this class from KB data
  const allFaecher=[...new Set(Object.keys(S.kbData).filter(k=>k.startsWith(kl.id+'||')).map(k=>k.split('||')[3]||'').filter(Boolean))];
  // If selFach is not in this class, reset
  if(S.selFach&&!allFaecher.includes(S.selFach))S.selFach=allFaecher[0]||'';
  const dates=kbDates(S.selKlasse,S.selFach);
  const fmtD=d=>{const p=d.split('-');return p[2]+'.'+p[1]+'.'+(p[0].slice(2))};

  let tbl='';
  if(dates.length===0){
    tbl=`<div style="text-align:center;padding:40px 20px;color:var(--tx3);font-size:13px">
      <i class="ti ti-calendar-event" style="font-size:28px;display:block;margin-bottom:10px" aria-hidden="true"></i>
      Noch keine Unterrichtsdaten.<br>Klicke im Wochenplan auf „→ Liste" bei einer Stunde,<br>oder füge ein Datum manuell hinzu.
      <br><br><button class="btn" onclick="openAddSuS()" style="margin:0 auto;font-size:12px"><i class="ti ti-user-plus" aria-hidden="true"></i>Schüler/in hinzufügen</button>
    </div>`;
  } else {
    tbl=`<div class="kb-legend">
      <span class="kll"><span style="width:11px;height:11px;border-radius:50%;background:#639922;display:inline-block"></span>Aktiv</span>
      <span class="kll"><span style="width:11px;height:11px;border-radius:50%;background:#EF9F27;display:inline-block"></span>Gut</span>
      <span class="kll"><span style="width:11px;height:11px;border-radius:50%;background:#D85A30;display:inline-block"></span>Wenig</span>
      <span class="kll"><span style="width:11px;height:11px;border-radius:50%;background:#E24B4A;display:inline-block"></span>Nicht aktiv</span>
      <span class="kll"><span style="width:5px;height:5px;border-radius:50%;background:var(--acbor);display:inline-block"></span>Notiz</span>
      <span class="kll" style="color:var(--tx3);font-size:10px">Klick = Farbe · Rechtsklick = Notiz</span>
      <span class="kll" style="margin-left:auto;color:var(--tx3);font-size:10px">Klick = Farbe · Rechtsklick = Notiz</span>
    </div>
${allFaecher.length>0?`<div style='display:flex;gap:6px;margin-bottom:8px;align-items:center'><span style='font-size:11px;color:var(--tx2);font-weight:500'>Fach:</span>${[''].concat(allFaecher).map(f=>'<button class="btn sml '+(S.selFach===f?'pri':'')+'" onclick="setSelFach(\''+f+'\')">'+(f||'Alle')+'</button>').join('')}</div>`:''}
    <div class="kb-wrap"><table class="kb-tbl"><thead><tr>
      <th class="namecol">Schüler/in</th>`;
    dates.forEach(d=>{
      // Show fach in header if no fach filter (showing all)
      const colKey=Object.keys(S.kbData).find(k=>k.startsWith(kl.id+'||'+kl.schueler[0]?.id+'||'+d));
      const colFach=colKey?colKey.split('||')[3]||'':'';
      const colLbl=fmtD(d)+(colFach&&!S.selFach?'<br><span style="font-size:9px;color:var(--actx);font-weight:400">'+esc(colFach)+'</span>':'');
      tbl+=`<th class="datecol" title="Spalte löschen" onclick="confirmDelKbDate('${d}')">${colLbl}</th>`;
    });
    tbl+=`<th style="min-width:70px;text-align:center">Trend</th></tr></thead><tbody>`;

    kl.schueler.forEach(s=>{
      tbl+=`<tr><td class="namecell" style="display:flex;align-items:center;justify-content:space-between;gap:4px">${esc(s.name)}<button onclick="deleteSuS('${s.id}')" title="Schüler/in löschen" style="background:transparent;border:none;cursor:pointer;color:var(--tx3);font-size:11px;padding:1px 3px;line-height:1;flex-shrink:0" onmouseover="this.style.color='var(--re)'" onmouseout="this.style.color='var(--tx3)'"><i class='ti ti-x'></i></button></td>`;
      dates.forEach(d=>{
        const e=kbGet(S.selKlasse,s.id,d);
        const hasNote=e.note&&e.note.trim();
        tbl+=`<td class="datacell" style="background:${KB_BG[e.color]}"
          onclick="kbCycleColor('${s.id}','${d}')"

          ${hasNote?'<span class="note-ind"></span>':''}
        </td>`;
      });
      const lastFive=dates.slice(-5).map(d=>`<span class="tb ${kbGet(S.selKlasse,s.id,d).color}"></span>`).join('');
      tbl+=`<td class="trendcell"><div class="trend-bar">${lastFive}</div></td></tr>`;
    });
    tbl+='</tbody></table></div>';
  }

  c.innerHTML=tabs+tbl;

function selKl(id){S.selKlasse=id;S.selFach='';render()}
function setSelFach(f){S.selFach=f;render();}
function openAddSuS(){
  if(!S.selKlasse){toast('Bitte zuerst eine Klasse auswählen');return;}
  S.modal={type:'addSuS'};renderModal();
}
function saveSuS(){
  const n=document.getElementById('ns-n')?.value.trim()||'';
  if(!n){alert('Bitte einen Namen eingeben.');return;}
  const kl=S.klassen.find(k=>k.id===S.selKlasse);
  if(!kl)return;
  kl.schueler.push({id:'s'+Date.now(),name:n});
  saveAll();closeModal();toast(n+' hinzugefügt');render();
}
function deleteSuS(sid){
  const kl=S.klassen.find(k=>k.id===S.selKlasse);
  if(!kl)return;
  const s=kl.schueler.find(x=>x.id===sid);
  if(!s)return;
  if(!confirm('"'+s.name+'" aus der Klasse entfernen?\nMitarbeitsdaten dieser Person werden ebenfalls gelöscht.'))return;
  Object.keys(S.kbData).forEach(k=>{if(k.startsWith(S.selKlasse+'||'+sid+'||'))delete S.kbData[k];});
  kl.schueler=kl.schueler.filter(x=>x.id!==sid);
  saveAll();toast(s.name+' entfernt');render();
}
function addKbDateManual(){
  const d=prompt('Datum (TT.MM.JJJJ):',new Date().toLocaleDateString('de-DE'));
  if(!d)return;
  const p=d.split('.');if(p.length<3)return;
  const iso=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  kbAddDate(S.selKlasse,iso);render();toast('Datum hinzugefügt')}

function kbCycleColor(sid,date){
  const e=kbGet(S.selKlasse,sid,date);
  e.color=KB_CYCLE[e.color]||'gruen';
  kbSet(S.selKlasse,sid,date,e);render()}

function openKbNote(ev,sid,date){
  ev.preventDefault();ev.stopPropagation();
  S.modal={type:'kbnote',sid,date};renderModal()}

function confirmDelKbDate(date){
  const fachLabel=S.selFach?' ('+S.selFach+')':'';
  if(!confirm('Spalte '+date+fachLabel+' löschen?'))return;
  const kl=S.klassen.find(k=>k.id===S.selKlasse);
  kl?.schueler.forEach(s=>delete S.kbData[kbKey(S.selKlasse,s.id,date,S.selFach)]);
  saveAll();render()}

function deleteKlasse(){
  const kl=S.klassen.find(k=>k.id===S.modal.id);
  if(!kl)return;
  if(!confirm('Klasse "'+kl.name+'" und alle Mitarbeitsdaten löschen?\nDies kann nicht rückgängig gemacht werden.'))return;
  // Remove KB data for this class
  Object.keys(S.kbData).forEach(key=>{if(key.startsWith(kl.id+'||'))delete S.kbData[key];});
  S.klassen=S.klassen.filter(k=>k.id!==S.modal.id);
  if(S.selKlasse===S.modal.id)S.selKlasse=S.klassen[0]?.id||null;

/* ===== IMPORT/EXPORT ===== */
function importFile(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>processCSV(e.target.result);r.readAsText(f,'UTF-8')}
function importText(){processCSV(document.getElementById('csv-tx')?.value||'')}
function processCSV(text){
  const lines=text.trim().split('\n').filter(Boolean);const bk={};
  lines.forEach(l=>{const p=l.split(/[;,]/).map(s=>s.trim());if(p.length<2)return;const nm=p[0]+(p[1]?', '+p[1]:'');const kl=p[2]||'Unbekannt';if(!bk[kl])bk[kl]=[];bk[kl].push({id:'s'+Date.now()+Math.random().toString(36).slice(2),name:nm})});
  let nk=0,tot=0;
  Object.entries(bk).forEach(([kn,sus])=>{let k=S.klassen.find(x=>x.name===kn);if(!k){k={id:'k'+Date.now(),name:kn,fach:'',schueler:[]};S.klassen.push(k);nk++}k.schueler=[...k.schueler,...sus];tot+=sus.length});
  saveAll();toast(`${tot} SuS importiert, ${nk} neue Klasse(n)`);showView('klassen')}
function connectOutlook(){const cid=document.getElementById('ms-cid')?.value.trim()||'';const tid=document.getElementById('ms-tid')?.value.trim()||'common';if(!cid){alert('Client-ID fehlt');return}localStorage.setItem('ms_cid',cid);lkPush('ms_cid',cid);localStorage.setItem('ms_tid',tid);lkPush('ms_tid',tid);const sc=encodeURIComponent('https://graph.microsoft.com/Calendars.Read');const rd=encodeURIComponent(window.location.href.split('?')[0]);window.open(`https://login.microsoftonline.com/${tid}/oauth2/v2.0/authorize?client_id=${cid}&response_type=token&redirect_uri=${rd}&scope=${sc}&response_mode=fragment`,'_blank','width=520,height=620')}
function savePrefs(){const pn=document.getElementById('p-n')?.value||'',pss=document.getElementById('p-s')?.value||'BBZ RD-ECK',pf=document.getElementById('p-f')?.value||'';localStorage.setItem('pref_name',pn);lkPush('pref_name',pn);localStorage.setItem('pref_schule',pss);lkPush('pref_schule',pss);localStorage.setItem('pref_faecher',pf);lkPush('pref_faecher',pf);if(pss)document.getElementById('school-lbl').textContent=pss;toast('Gespeichert')}
function exportData(){const d={lessons:S.lessons,klassen:S.klassen,hjEntries:S.hjEntries,stundenplaene:S.stundenplaene,weekConfig:S.weekConfig,kbData:S.kbData,lessonLinks:S.lessonLinks,exported:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`lehrerplaner-${new Date().toISOString().split('T')[0]}.json`;a.click();toast('Export gestartet')}
function loadJSON(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.lessons)S.lessons=d.lessons;if(d.klassen)S.klassen=d.klassen;if(d.hjEntries)S.hjEntries=d.hjEntries;if(d.stundenplaene)S.stundenplaene=d.stundenplaene;if(d.weekConfig)S.weekConfig=d.weekConfig;if(d.kbData)S.kbData=d.kbData;if(d.lessonLinks)S.lessonLinks=d.lessonLinks;saveAll();toast('Wiederhergestellt');render()}catch{alert('Fehler beim Lesen.')}};r.readAsText(f)}
function clearAll(){if(!confirm('Wirklich alle Daten löschen?'))return;S.lessons={};S.hjEntries={};S.kbData={};saveAll();toast('Gelöscht');render()}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
if(window.location.hash?.includes('access_token')){const p=new URLSearchParams(window.location.hash.slice(1));const tk=p.get('access_token');if(tk){localStorage.setItem('ms_token',tk);lkPush('ms_token',tk);window.location.hash='';toast('Outlook verbunden')}}

const ps=localStorage.getItem('pref_schule');
if(ps)document.getElementById('school-lbl').textContent=ps;
(()=>{const now=new Date();if(now.getMonth()===7){const key='lp_aug_'+now.getFullYear();if(!localStorage.getItem(key)){localStorage.setItem(key,'1');setTimeout(()=>{if(confirm('Neues Schuljahr – Klassenlisten aktualisieren?\nAltes Schuljahr zuerst unter Ferien archivieren.')){showView('ferien');}},800);}}})();
render();
</script>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a5276">
<title>Anmelden – Lehrerkalender</title>
<style>
:root{--bg:#f5f4f0;--sur:#fff;--bor:rgba(0,0,0,.1);--tx:#1a1a18;--tx2:#5a5a52;--tx3:#9a9a8e;--ac:#1a5276;--acbor:#378add;--re:#993c1d;--rebg:#faece7;--rad:10px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--sur:#242420;--bor:rgba(255,255,255,.1);--tx:#f0efe9;--tx2:#a0a095;--tx3:#606058;--ac:#378add;--acbor:#185fa5;--re:#f0997b;--rebg:#4a1b0c}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--sur);border:.5px solid var(--bor);border-radius:var(--rad);padding:28px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.logo-ic{width:36px;height:36px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}
.logo-tx{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:var(--tx3);margin-top:1px}
label{display:block;font-size:12px;color:var(--tx2);margin:14px 0 5px}
input{width:100%;padding:10px 11px;font-size:14px;border:1px solid var(--bor);border-radius:8px;background:var(--bg);color:var(--tx)}
input:focus{outline:none;border-color:var(--acbor)}
button{width:100%;margin-top:20px;padding:11px;font-size:14px;font-weight:600;color:#fff;background:var(--ac);border:none;border-radius:8px;cursor:pointer}
button:disabled{opacity:.6;cursor:default}
.err{margin-top:14px;padding:9px 11px;font-size:13px;color:var(--re);background:var(--rebg);border-radius:8px;display:none}
.err.show{display:block}
.hint{margin-top:16px;font-size:11px;color:var(--tx3);line-height:1.5}
</style>
</head>
<body>
<form class="card" id="f" autocomplete="on">
  <div class="logo">
    <div class="logo-ic">L</div>
    <div><div class="logo-tx">Lehrerkalender</div><div class="logo-sub">BBZ RD-ECK</div></div>
  </div>
  <label for="u">Benutzername</label>
  <input id="u" name="username" type="text" autocomplete="username" autofocus required>
  <label for="p">Passwort</label>
  <input id="p" name="password" type="password" autocomplete="current-password">
  <button id="b" type="submit">Anmelden</button>
  <div class="err" id="e"></div>
  <div class="hint" id="hint"></div>
</form>
<script>
var f=document.getElementById('f'),e=document.getElementById('e'),b=document.getElementById('b');
f.addEventListener('submit',function(ev){
  ev.preventDefault();
  e.classList.remove('show');b.disabled=true;b.textContent='Anmelden…';
  fetch('/auth/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    credentials:'same-origin',
    body:JSON.stringify({username:document.getElementById('u').value.trim(),password:document.getElementById('p').value})
  }).then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
    .then(function(res){
      if(res.ok){window.location.replace('index.html');return;}
      throw new Error(res.j&&res.j.error?res.j.error:'Anmeldung fehlgeschlagen');
    })
    .catch(function(err){e.textContent=err.message;e.classList.add('show');b.disabled=false;b.textContent='Anmelden';});
});
</script>
</body>
</html>
